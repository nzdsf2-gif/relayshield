name: INTEL Channel Discovery

on:
  schedule:
    # Every Monday at 08:00 UTC — weekly (increased from monthly for faster channel growth)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Also triggerable manually from GitHub Actions tab

jobs:
  discover:
    name: Discover new Telegram threat channels
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Invoke discovery Lambda
        id: invoke
        run: |
          RESULT=$(aws lambda invoke \
            --function-name relayshield-intel-discovery \
            --payload '{"source": "github-actions"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/discovery_response.json \
            --query 'LogResult' \
            --output text | base64 --decode | tail -20)

          echo "=== Lambda logs (last 20 lines) ==="
          echo "$RESULT"

          RESPONSE=$(cat /tmp/discovery_response.json)
          echo "=== Response ==="
          echo "$RESPONSE"

          NEWLY_ADDED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('newly_added', 0))")
          RE_VERIFIED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('re_verified', 0))")
          echo "newly_added=$NEWLY_ADDED" >> $GITHUB_OUTPUT
          echo "re_verified=$RE_VERIFIED" >> $GITHUB_OUTPUT

      - name: Open GitHub issue if new channels found
        if: ${{ steps.invoke.outputs.newly_added > 0 }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "INTEL: ${{ steps.invoke.outputs.newly_added }} new Telegram channels discovered — review for activation" \
            --body "$(cat <<'EOF'
          ## New channels discovered

          The monthly INTEL discovery Lambda found **${{ steps.invoke.outputs.newly_added }} new channels** that passed accessibility checks.

          They have been written to the \`relayshield_intel_channels\` DynamoDB table with \`active: true\`.
          The intel monitor will pick them up automatically on its next 6-hour poll — no redeploy needed.

          ## Review checklist

          - [ ] Check the Telegram admin digest for the channel list
          - [ ] Verify each new channel is relevant (not a honeypot or noise source)
          - [ ] For any false positives: set \`active: false\` in DynamoDB or comment here
          - [ ] Update the Tines README if coverage categories changed
          - [ ] Close this issue once reviewed

          **Also re-verified:** ${{ steps.invoke.outputs.re_verified }} existing channels still active.

          _Run: ${{ github.run_id }} · ${{ github.event_name }}_
          EOF
          )"
