name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Run Security Checks
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by ggshield for full history scanning

      # -----------------------------------------------------------------------
      # 2. Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 3. Install security tools
      # -----------------------------------------------------------------------
      - name: Install security tools
        run: |
          pip install bandit safety ggshield

      # -----------------------------------------------------------------------
      # 4. Bandit — static analysis for Python security issues
      #    -ll = report only MEDIUM and HIGH severity issues (fails on HIGH)
      #    -r  = recursive; targets all .py files in the repo root
      # -----------------------------------------------------------------------
      - name: Run Bandit (static analysis)
        run: |
          bandit -r . \
            --exclude ./.github,./node_modules \
            --severity-level high \
            --confidence-level medium \
            -f txt \
            -o bandit-report.txt || true

          # Re-run with exit-code so the step fails on HIGH severity findings
          bandit -r . \
            --exclude ./.github,./node_modules \
            --severity-level high \
            --confidence-level medium \
            -q

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

      # -----------------------------------------------------------------------
      # 5. Safety — check requirements.txt against known CVE database
      # -----------------------------------------------------------------------
      - name: Run Safety (dependency CVE check)
        run: |
          safety check \
            --file requirements.txt \
            --full-report

      # -----------------------------------------------------------------------
      # 6. GitGuardian — secret scanning
      #    Requires GITGUARDIAN_API_KEY secret in the repository settings.
      # -----------------------------------------------------------------------
      - name: Run ggshield secret scan
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          ggshield secret scan repo .
