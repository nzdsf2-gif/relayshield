name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Run Security Checks
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required by gitleaks for historical secret scanning

      # -----------------------------------------------------------------------
      # 2. Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 3. Install security tools
      # -----------------------------------------------------------------------
      - name: Install security tools
        run: |
          pip install bandit safety

      # -----------------------------------------------------------------------
      # 4. Bandit — static analysis for Python security issues
      #    -ll = report only MEDIUM and HIGH severity issues (fails on HIGH)
      #    -r  = recursive; targets all .py files in the repo root
      # -----------------------------------------------------------------------
      - name: Run Bandit (static analysis)
        run: |
          bandit -r . \
            --exclude ./.github,./node_modules \
            --severity-level high \
            --confidence-level medium \
            -f txt \
            -o bandit-report.txt || true

          # Re-run with exit-code so the step fails on HIGH severity findings
          bandit -r . \
            --exclude ./.github,./node_modules \
            --severity-level high \
            --confidence-level medium \
            -q

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

      # -----------------------------------------------------------------------
      # 5. Safety — check requirements.txt against known CVE database
      # -----------------------------------------------------------------------
      - name: Run Safety (dependency CVE check)
        run: |
          safety check \
            --file requirements.txt \
            --full-report

      # -----------------------------------------------------------------------
      # 6. Gitleaks — secret scanning (open source, no API key required)
      #    Scans full git history for accidentally committed secrets.
      #    Uses GITHUB_TOKEN which is automatically available in all workflows.
      # -----------------------------------------------------------------------
      - name: Run gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
